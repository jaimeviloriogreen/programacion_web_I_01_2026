<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clase-siete</title>
  </head>
  <body>
    <main class="main">
      <h1>Learning Javascript</h1>
      <!-- Data form -->
      <section class="form">
        <form class="form-data">
          <input type="text" placeholder="Nombre" name="fname" />
          <input type="text" placeholder="Apellido" name="lname" />
          <input type="text" placeholder="Carrera" name="career" />

          <button class="form__btn" type="submit">Ingresar</button>
        </form>
      </section>
      <!-- Data table -->
      <section class="data">
        <button class="btn-show">Mostrar</button>

        <section class="content">
          <table class="data-table">
            <thead class="thead"></thead>
            <tbody class="tbody"></tbody>
          </table>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
