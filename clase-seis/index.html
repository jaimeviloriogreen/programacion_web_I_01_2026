<!doctype html>
<html lang="en">

    <title>Aprendiendo Javascript</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main">
      <h1 class="title">Aprendiendo Javascript</h1>

      <form class="form">
